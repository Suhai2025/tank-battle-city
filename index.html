// ============ 音效 ============
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
}

function beep(freq, vol, dur) {
  if (!audioCtx) return;
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'square';
    o.frequency.value = freq;
    g.gain.value = vol;
    o.connect(g);
    g.connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

// ============ Tank 类 ============
class Tank {
  constructor(x, y, dir, color, isPlayer) {
    this.x = x;
    this.y = y;
    this.dir = dir;
    this.color = color;
    this.speed = isPlayer ? 2.5 : 1.2;
    this.size = TILE - 4;
    this.isPlayer = !!isPlayer;
    this.bullets = [];
    this.cooldown = 0;
    this.alive = true;
    this.spawnTimer = 60;
    this.moveTimer = 0;
    this.aiDir = dir;
  }

  collidesTile(x, y) {
    const m = 3;
    const pts = [
      [x - this.size / 2 + m, y - this.size / 2 + m],
      [x + this.size / 2 - m, y - this.size / 2 + m],
      [x - this.size / 2 + m, y + this.size / 2 - m],
      [x + this.size / 2 - m, y + this.size / 2 - m],
    ];
    for (const [px, py] of pts) {
      if (px < 0 || px >= canvas.width || py < 0 || py >= canvas.height) return true;
      const t = map[Math.floor(py / TILE)]?.[Math.floor(px / TILE)];
      if (t === T_BRICK || t === T_STEEL || t === T_WATER) return true;
      if (t === T_BASE && !this.isPlayer) return true;
    }
    return false;
  }

  collidesTank(x, y, others) {
    for (const t of others) {
      if (!t || t === this || !t.alive || t.spawnTimer > 0) continue;
      if (Math.abs(x - t.x) < this.size && Math.abs(y - t.y) < this.size) return true;
    }
    return false;
  }

  tryMove(dx, dy, dir) {
    this.dir = dir;
    const nx = this.x + dx * this.speed;
    const ny = this.y + dy * this.speed;
    if (!this.collidesTile(nx, ny)) {
      const others = this.isPlayer ? enemies : (player ? [player] : []);
      if (!this.collidesTank(nx, ny, others)) {
        this.x = nx;
        this.y = ny;
        return true;
      }
    }
    return false;
  }

  shoot() {
    if (this.cooldown > 0) return;
    if (this.bullets.length >= (this.isPlayer ? 2 : 1)) return;
    let bx = this.x, by = this.y;
    const off = this.size / 2 + 2;
    if (this.dir === DIR_UP) by -= off;
    if (this.dir === DIR_DOWN) by += off;
    if (this.dir === DIR_LEFT) bx -= off;
    if (this.dir === DIR_RIGHT) bx += off;
    this.bullets.push({ x: bx, y: by, dir: this.dir, alive: true });
    this.cooldown = this.isPlayer ? 12 : 50;
    beep(this.isPlayer ? 600 : 300, 0.03, 0.06);
  }

  updateBullets() {
    const speed = this.isPlayer ? 7 : 3.5;
    for (const b of this.bullets) {
      if (!b.alive) continue;
      if (b.dir === DIR_UP) b.y -= speed;
      if (b.dir === DIR_DOWN) b.y += speed;
      if (b.dir === DIR_LEFT) b.x -= speed;
      if (b.dir === DIR_RIGHT) b.x += speed;

      if (b.x < 0 || b.x >= canvas.width || b.y < 0 || b.y >= canvas.height) {
        b.alive = false;
        continue;
      }

      const col = Math.floor(b.x / TILE);
      const row = Math.floor(b.y / TILE);
      const tile = map[row]?.[col];

      if (tile === T_BRICK) {
        map[row][col] = T_EMPTY;
        b.alive = false;
        beep(200, 0.05, 0.06);
      } else if (tile === T_STEEL) {
        b.alive = false;
        beep(120, 0.05, 0.06);
      } else if (tile === T_BASE) {
        map[row][col] = T_EMPTY;
        b.alive = false;
        endGame(false);
        return;
      }

      if (!b.alive) continue;

      // check hit enemy bullets
      const otherTanks = this.isPlayer ? enemies : (player ? [player] : []);
      for (const ot of otherTanks) {
        if (!ot) continue;
        for (const ob of ot.bullets) {
          if (!ob.alive) continue;
          if (Math.abs(b.x - ob.x) < 6 && Math.abs(b.y - ob.y) < 6) {
            b.alive = false;
            ob.alive = false;
          }
        }
      }

      if (!b.alive) continue;

      // check hit tanks
      for (const t of otherTanks) {
        if (!t || !t.alive || t.spawnTimer > 0) continue;
        if (Math.abs(b.x - t.x) < t.size / 2 && Math.abs(b.y - t.y) < t.size / 2) {
          b.alive = false;
          t.alive = false;
          beep(150, 0.08, 0.15);

          if (this.isPlayer) {
            score += 100;
            updateUI();
          } else {
            lives--;
            updateUI();
            if (lives <= 0) {
              endGame(false);
              return;
            }
            respawnPlayer();
          }
          break;
        }
      }
    }
    this.bullets = this.bullets.filter(b => b.alive);
    if (this.cooldown > 0) this.cooldown--;
  }

  draw() {
    if (!this.alive) return;
    if (this.spawnTimer > 0) {
      this.spawnTimer--;
      if (Math.floor(this.spawnTimer / 4) % 2 === 0) return;
    }

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate((this.dir * Math.PI) / 2);

    // 履带
    ctx.fillStyle = '#444';
    ctx.fillRect(-this.size / 2 - 3, -this.size / 2, 5, this.size);
    ctx.fillRect(this.size / 2 - 2, -this.size / 2, 5, this.size);

    // 身体
    ctx.fillStyle = this.color;
    ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);

    // 炮管
    ctx.fillStyle = this.isPlayer ? '#5f5' : '#f55';
    ctx.fillRect(-3, -this.size / 2, 6, this.size * 0.6);

    ctx.restore();

    // 子弹
    for (const b of this.bullets) {
      if (!b.alive) continue;
      ctx.fillStyle = '#ff0';
      ctx.beginPath();
      ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ============ 地图绘制 ============
function drawMap() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const t = map[r]?.[c];
      if (t === T_EMPTY || t === undefined) continue;
      const x = c * TILE, y = r * TILE;
      if (t === T_BRICK) {
        ctx.fillStyle = '#b5651d';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = '#8b4513';
        ctx.fillRect(x + TILE / 4, y, 2, TILE);
        ctx.fillRect(x + TILE * 3 / 4, y, 2, TILE);
        ctx.fillRect(x, y + TILE / 2, TILE, 2);
        ctx.strokeStyle = '#654321';
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 0.5, y + 0.5, TILE - 1, TILE - 1);
      } else if (t === T_STEEL) {
        ctx.fillStyle = '#999';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = '#bbb';
        ctx.fillRect(x + 2, y + 2, TILE / 2 - 2, TILE / 2 - 2);
        ctx.fillRect(x + TILE / 2, y + TILE / 2, TILE / 2 - 2, TILE / 2 - 2);
        ctx.strokeStyle = '#666';
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 0.5, y + 0.5, TILE - 1, TILE - 1);
      } else if (t === T_WATER) {
        ctx.fillStyle = '#259';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = '#36a';
        for (let i = 0; i < 5; i++) {
          const rx = (Date.now() / 200 + i * 6) % (TILE + 6) - 6;
          ctx.fillRect(x + rx, y, 3, TILE);
        }
      } else if (t === T_BASE) {
        ctx.fillStyle = '#333';
        ctx.fillRect(x, y, TILE, TILE);
        // 鹰
        ctx.fillStyle = '#e44';
        ctx.beginPath();
        ctx.moveTo(x + TILE / 2, y + 4);
        ctx.lineTo(x + TILE - 4, y + TILE / 2);
        ctx.lineTo(x + TILE / 2, y + TILE - 4);
        ctx.lineTo(x + 4, y + TILE / 2);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#ff0';
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE / 2, 4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
}

function drawTrees() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (map[r]?.[c] !== T_TREE) continue;
      const x = c * TILE, y = r * TILE;
      ctx.fillStyle = 'rgba(30,130,30,0.75)';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = 'rgba(20,100,20,0.8)';
      ctx.beginPath();
      ctx.arc(x + TILE / 2, y + TILE / 2, TILE / 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ============ 游戏逻辑 ============
function respawnPlayer() {
  player = new Tank(COLS / 2 * TILE, (ROWS - 1) * TILE, DIR_UP, '#4a4', true);
  player.spawnTimer = 90;
}

function spawnEnemy() {
  if (enemiesToSpawn <= 0) return;
  const pt = SPAWN_POINTS[Math.floor(Math.random() * 3)];
  const ex = pt.col * TILE + TILE / 2;
  const ey = pt.row * TILE + TILE / 2;
  // check not blocked
  for (const e of enemies) {
    if (e.alive && Math.abs(e.x - ex) < TILE && Math.abs(e.y - ey) < TILE) return;
  }
  const en = new Tank(ex, ey, DIR_DOWN, '#c44', false);
  en.spawnTimer = 60;
  enemies.push(en);
  enemiesToSpawn--;
  updateUI();
}

function endGame(won) {
  gameRunning = false;
  gameOver = true;
  gameWon = won;
  const el = document.getElementById('gameOver');
  el.style.display = 'block';
  el.style.color = won ? '#0f0' : '#f44';
  el.innerHTML = won
    ? '恭喜通关！<br><span style="font-size:16px">按 Enter 重新开始</span>'
    : '游戏结束<br><span style="font-size:16px">按 Enter 重新开始</span>';
  beep(won ? 523 : 60, 0.1, 0.3);
}

function nextLevel() {
  score += 500;
  if (currentLevel + 1 >= LEVELS.length) {
    endGame(true);
    return;
  }
  currentLevel++;
  startLevel();
  updateUI();
  beep(660, 0.08, 0.2);
}

function startLevel() {
  map = LEVELS[currentLevel].slice();
  enemies = [];
  enemiesToSpawn = enemiesPerLevel + currentLevel * 2;
  spawnCooldown = 30;
  gameRunning = true;
  gameOver = false;
  gameWon = false;
  document.getElementById('gameOver').style.display = 'none';
  if (!player || !player.alive) {
    respawnPlayer();
  } else {
    player.x = COLS / 2 * TILE;
    player.y = (ROWS - 1) * TILE;
    player.spawnTimer = 60;
    player.bullets = [];
  }
  updateUI();
}

function restartGame() {
  score = 0;
  lives = 3;
  currentLevel = 0;
  startLevel();
  updateUI();
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = lives;
  const aliveCount = enemies.filter(e => e.alive).length;
  document.getElementById('enemies').textContent = enemiesToSpawn + aliveCount;
  document.getElementById('level').textContent = currentLevel + 1;
}

// ============ 输入处理 ============
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  ensureAudio();
  if (e.key === 'Enter' && gameOver) {
    restartGame();
  }
  e.preventDefault();
});

window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
  e.preventDefault();
});

function handleInput() {
  if (!player || !player.alive || player.spawnTimer > 0) return;

  let dx = 0, dy = 0, dir = player.dir;
  if (keys['w'] || keys['arrowup']) { dy = -1; dir = DIR_UP; }
  else if (keys['s'] || keys['arrowdown']) { dy = 1; dir = DIR_DOWN; }
  else if (keys['a'] || keys['arrowleft']) { dx = -1; dir = DIR_LEFT; }
  else if (keys['d'] || keys['arrowright']) { dx = 1; dir = DIR_RIGHT; }

  if (dx !== 0 || dy !== 0) {
    player.tryMove(dx, dy, dir);
  }

  if (keys['j'] || keys[' ']) {
    player.shoot();
  }
}

// ============ 敌人 AI ============
function enemyAI(enemy) {
  if (!enemy.alive || enemy.spawnTimer > 0) return;

  enemy.moveTimer++;

  // 偶尔朝玩家方向移动
  if (player && player.alive && Math.random() < 0.02) {
    const dx = player.x - enemy.x;
    const dy = player.y - enemy.y;
    enemy.aiDir = Math.abs(dx) > Math.abs(dy)
      ? (dx > 0 ? DIR_RIGHT : DIR_LEFT)
      : (dy > 0 ? DIR_DOWN : DIR_UP);
  }

  // 卡住时换方向
  if (enemy.moveTimer > 50) {
    enemy.aiDir = Math.floor(Math.random() * 4);
    enemy.moveTimer = 0;
  }

  // 偶尔射击
  if (Math.random() < 0.02) {
    enemy.shoot();
  }

  const dirMap = { [DIR_UP]: [0, -1], [DIR_DOWN]: [0, 1], [DIR_LEFT]: [-1, 0], [DIR_RIGHT]: [1, 0] };
  const [dx, dy] = dirMap[enemy.aiDir];
  const moved = enemy.tryMove(dx, dy, enemy.aiDir);

  if (!moved) {
    // 换方向
    const dirs = [DIR_UP, DIR_RIGHT, DIR_DOWN, DIR_LEFT];
    enemy.aiDir = dirs[Math.floor(Math.random() * 4)];
    enemy.moveTimer = 0;
  }
}

// ============ 主循环 ============
function gameLoop() {
  if (gameRunning) {
    handleInput();

    if (player) {
      player.updateBullets();
    }

    for (const enemy of enemies) {
      if (enemy.spawnTimer > 0) {
        enemy.spawnTimer--;
        continue;
      }
      enemyAI(enemy);
      enemy.updateBullets();
    }

    // 清理死亡敌人（保留有飞行子弹的）
    enemies = enemies.filter(e => e.alive || e.bullets.some(b => b.alive));

    // 检查是否所有敌人都消灭了
    const aliveEnemies = enemies.filter(e => e.alive);
    if (enemiesToSpawn <= 0 && aliveEnemies.length === 0) {
      const hasFlyingBullets = enemies.some(e => e.bullets.some(b => b.alive));
      if (!hasFlyingBullets) {
        nextLevel();
      }
    }

    // 生成敌人（场上最多4个）
    if (enemiesToSpawn > 0) {
      spawnCooldown--;
      if (spawnCooldown <= 0) {
        const count = enemies.filter(e => e.alive).length;
        if (count < 4) {
          spawnEnemy();
          spawnCooldown = 30;
        }
      }
    }
  }

  // 渲染
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawMap();

  if (player && player.alive) player.draw();
  for (const e of enemies) {
    if (e.alive) e.draw();
  }

  drawTrees();

  requestAnimationFrame(gameLoop);
}

// ============ 启动 ============
startLevel();
updateUI();
gameLoop();
</script>
